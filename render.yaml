services:
  - type: web
    name: breathe-esg-backend
    env: python
    region: oregon
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: cd backend && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: "*.onrender.com,localhost"
      - key: SECRET_KEY
        generateValue: true
