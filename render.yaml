services:
  - type: web
    name: breathe-esg-backend
    env: python
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt && python manage.py migrate && python manage.py create_default_user && python manage.py collectstatic --noinput
    startCommand: cd backend && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: "*.onrender.com,localhost"
      - key: SECRET_KEY
        generateValue: true
